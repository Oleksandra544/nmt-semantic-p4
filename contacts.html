<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Контакти - Зворотний зв'язок</title>
</head>
<body>
    <header>
        <nav aria-label="Головна навігація">
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="topic.html">Математика (Тема)</a></li>
                <li><a href="contacts.html" aria-current="page">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <main id="main">
        <h1>Зв'яжіться з нами</h1>
        <form action="#" method="post">
            <fieldset>
                <legend>Ваші дані</legend>
                
                <p>
                    <label for="user-name">Ім’я:</label>
                    <input type="text" id="user-name" name="name" required>
                </p>

                <p>
                    <label for="user-email">Ел. пошта:</label>
                    <input type="email" id="user-email" name="email" required>
                </p>

                <p>
                    <label for="user-tel">Телефон:</label>
                    <input type="tel" id="user-tel" name="tel" 
                           pattern="\+380[0-9]{9}" 
                           aria-describedby="tel-hint">
                    <small id="tel-hint">Формат: +380XXXXXXXXX</small>
                </p>

                <p>
                    <label for="message">Повідомлення (мін. 10 символів):</label><br>
                    <textarea id="message" name="message" minlength="10" required></textarea>
                </p>

                <button type="submit">Надіслати</button>
            </fieldset>
        </form>
    </main>
</body>
</html>
